  SURFACEFORGE — COMPLETE INSTRUCTIONS
  Surface Area Report Macro for SolidWorks 2014–2025
================================================================================

TABLE OF CONTENTS
──────────────────
  1. Installation
  2. Quick Start (Run the Macro)
  3. Permanent Toolbar Button Setup
  4. Keyboard Shortcut Setup
  5. How the Macro Works
  6. Automatic Mode Detection
  7. Surface Classification (6 Sides)
  8. Surface Type Detection & Formulas
  9. Material & Gauge Detection
  10. Auto-Generated Prep Notes
  11. HTML Report Features
  12. Excel Export
  13. PDF Export
  14. Screenshot / Thumbnail Capture

================================================================================
  1. INSTALLATION
================================================================================

  No installers, plugins, or admin rights required. Just one .bas file.

  REQUIREMENTS:
  • SolidWorks 2014 or later (Standard, Professional, or Premium)
  • Windows OS (SolidWorks requirement)
  • The downloaded file: SurfaceForge.bas

================================================================================
  2. QUICK START (Run the Macro)
================================================================================

  This is the fastest way to run the macro — no setup needed.

  STEP 1: Open your Part or Assembly file in SolidWorks.

  STEP 2: Go to menu: Tools → Macro → Run

  STEP 3: Browse to the downloaded SurfaceForge.bas file and click Open.

  STEP 4: Select "Main" from the macro list and click Run.

  STEP 5: Follow the on-screen prompts:
          • Which reference plane is your FRONT? (Enter 1, 2, or 3)
          • Revision? (optional)
          • Prepared by? (optional)

  STEP 6: The macro processes your model and opens an HTML report in your
          default browser.

  NOTE: You need to browse to the .bas file every time with this method.
  For repeated use, set up a toolbar button (Section 3).

================================================================================
  3. PERMANENT TOOLBAR BUTTON SETUP
================================================================================

  This adds a one-click button to your SolidWorks toolbar.

  STEP 1: Open SolidWorks (any document).

  STEP 2: Go to Tools → Macro → New…

  STEP 3: Save the file as "SurfaceForge.swp" in a permanent location
          (e.g., C:\\Macros\\SurfaceForge.swp).
          Do NOT save in a temp folder.

  STEP 4: The VBA Editor opens. Go to: File → Import File…

  STEP 5: Select the downloaded SurfaceForge.bas file and click Open.
          The module code appears in the editor.

  STEP 6: Close the VBA Editor (File → Close and Return to SolidWorks).

  STEP 7: Go to Tools → Customize → Commands tab.

  STEP 8: In the Categories list, scroll down and select "Macro".

  STEP 9: Drag "New Macro Button" from the buttons area to any toolbar
          (e.g., the main toolbar at the top).

  STEP 10: A dialog appears:
           • Macro File Path: Browse to your SurfaceForge.swp
           • Method: Select "Main"
           • Tooltip: Enter "SurfaceForge Report"
           • Pick an icon or use custom image
           Click OK.

  DONE! You now have a toolbar button that runs the report in one click.

================================================================================
  4. KEYBOARD SHORTCUT SETUP
================================================================================

  STEP 1: Complete Steps 1–6 from Section 3 first (create the .swp file).

  STEP 2: Go to Tools → Customize → Keyboard tab.

  STEP 3: Scroll down to the "Macros" row at the bottom.

  STEP 4: Click the [...] button in the Macros row.

  STEP 5: Browse to your SurfaceForge.swp file and click Open.

  STEP 6: Click in the "Shortcut(s)" column for the Macros row.

  STEP 7: Press your desired key combination.
          Suggested: Shift+S or Ctrl+Shift+R
          Make sure it doesn't conflict with existing shortcuts.

  STEP 8: Click OK to save.

================================================================================
  5. HOW THE MACRO WORKS
================================================================================

  When you run Main(), the macro performs these steps:

  1. Checks that a SolidWorks document is open (Part or Assembly).
  2. Prompts for Front Plane orientation (for surface classification).
  3. Prompts for Revision and Author (optional).
  4. Rebuilds the model to ensure geometry is current.
  5. Checks what is currently selected (faces, components, or nothing).
  6. Automatically determines the correct report mode.
  7. Scans all relevant faces, calculates areas, classifies surfaces.
  8. Detects material, gauge, and generates prep notes for each part.
  9. Captures an isometric screenshot (if possible).
  10. Generates a complete HTML report file.
  11. Opens the report in your default browser.

================================================================================
  6. AUTOMATIC MODE DETECTION
================================================================================

  The macro checks in this priority order:

  ┌──────────────────────────────┬──────────────────────────────────────────┐
  │ What You Have                │ Report Generated                         │
  ├──────────────────────────────┼──────────────────────────────────────────┤
  │ Faces selected               │ Selected Faces Report                    │
  │ Components selected (assy)   │ Selected Components Report               │
  │ Assembly with hidden parts   │ Isolated View Report (visible only)      │
  │ Full Assembly (nothing hid.) │ Full Assembly Report (all parts)         │
  │ Single Part file             │ Part Report (with thumbnail)             │
  └──────────────────────────────┴──────────────────────────────────────────┘

  Detection priority: Faces > Components > Isolated View > Assembly > Part

  NOTES:
  • Suppressed components are ALWAYS excluded.
  • Envelope components are ALWAYS excluded.
  • Only leaf-level Part documents are included (sub-assemblies are skipped).

================================================================================
  7. SURFACE CLASSIFICATION (6 SIDES)
================================================================================

  Every face is classified by analyzing its surface normal vector:

  ┌────────┬───────────────────────────────────────────────┬───────────┐
  │ Side   │ Condition                                     │ Color     │
  ├────────┼───────────────────────────────────────────────┼───────────┤
  │ Front  │ Normal along Front axis (+ direction)         │ Blue      │
  │ Rear   │ Normal along Front axis (- direction)         │ dk. Blue  │
  │ Top    │ Normal along Top axis (+ direction)           │ Green     │
  │ Bottom │ Normal along Top axis (- direction)           │ dk. Green │
  │ Right  │ Normal along Right axis (+ direction)         │ Orange    │
  │ Left   │ Normal along Right axis (- direction)         │ dk. Orange│
  │ Other  │ No dominant axis (e.g., 45° chamfer)          │ Gray      │
  └────────┴───────────────────────────────────────────────┴───────────┘

  The Front Plane prompt at startup determines axis mapping:
  • Option 1 (Front Plane): Front=Z, Top=Y, Right=X
  • Option 2 (Top Plane):   Front=Y, Top=Z, Right=X
  • Option 3 (Right Plane): Front=X, Top=Y, Right=Z

================================================================================
  8. SURFACE TYPE DETECTION & FORMULAS
================================================================================

  The macro uses SolidWorks API surface type checks:

  ┌──────────────┬──────────────┬──────────────────┬────────────────────┐
  │ Type         │ API Check    │ Formula          │ Dimensions Used    │
  ├──────────────┼──────────────┼──────────────────┼────────────────────┤
  │ Planar       │ IsPlane      │ L × W            │ Box max × mid      │
  │ Cylindrical  │ IsCylinder   │ π × D × H        │ Dia × Height       │
  │ Conical      │ IsCone       │ π × r × s        │ r, slant height    │
  │ Spherical    │ IsSphere     │ 4πr²             │ Avg dia → radius   │
  │ Toroidal     │ IsTorus      │ 4π²Rr            │ Major R, Minor r   │
  │ Complex      │ (fallback)   │ Area only        │ Full bounding box  │
  └──────────────┴──────────────┴──────────────────┴────────────────────┘

  UNIT CONVERSION:
  • Dimensions: SolidWorks internal (meters) × 39.3701 = inches
  • Areas: SolidWorks internal (m²) × 1550.0031 = sq inches
  • Square feet: sq inches ÷ 144

================================================================================
  9. MATERIAL & GAUGE DETECTION
================================================================================

  MATERIAL DETECTION:
  1. Reads from GetMaterialPropertyName2 (applied material)
  2. Falls back to custom property "Material"
  3. If neither found, shows "N/A"

  SHEET METAL GAUGE:
  • Scans all features for type "SheetMetal"
  • Reads the Thickness property from the sheet metal definition
  • Matches to the nearest standard steel gauge (7 ga through 30 ga)
  • Example output: "A36 Steel - 16 ga (0.0598 in)"

================================================================================
  10. AUTO-GENERATED PREP NOTES
================================================================================

  The macro generates surface preparation instructions based on material:

  ┌─────────────────────┬─────────────────────────────────────────────────┐
  │ Material Keyword    │ Preparation Instructions                       │
  ├─────────────────────┼─────────────────────────────────────────────────┤
  │ Stainless           │ Passivate surface, clean with solvent, apply   │
  │                     │ etching primer if needed.                       │
  ├─────────────────────┼─────────────────────────────────────────────────┤
  │ Alumin*             │ Etch or abrade surface, clean with solvent,    │
  │                     │ use self-etching primer.                        │
  ├─────────────────────┼─────────────────────────────────────────────────┤
  │ Steel / Iron        │ Sandblast or grind to bare metal, clean,       │
  │                     │ apply primer immediately.                       │
  ├─────────────────────┼─────────────────────────────────────────────────┤
  │ Copper / Brass      │ Clean with degreaser, bright dip if needed,    │
  │                     │ apply adhesion promoter.                        │
  ├─────────────────────┼─────────────────────────────────────────────────┤
  │ Zinc / Galvan*      │ Clean with ammonia-based solution, apply       │
  │                     │ galvanized metal primer.                        │
  ├─────────────────────┼─────────────────────────────────────────────────┤
  │ Plastic / ABS / etc │ Clean with soap and water, scuff sand,         │
  │                     │ apply plastic adhesion promoter.                │
  ├─────────────────────┼─────────────────────────────────────────────────┤
  │ (Unknown/Blank)     │ Clean surface, remove oil/grease before        │
  │                     │ painting.                                       │
  └─────────────────────┴─────────────────────────────────────────────────┘

  NOTE: All prep notes are editable in the HTML report before export.

================================================================================
  11. HTML REPORT FEATURES
================================================================================

  The macro generates a standalone HTML file and opens it in your browser.

  INTERACTIVE FEATURES:
  • Click any part row → expands to show face breakdown
  • Search bar → filter parts by name, material, any text
  • Click column headers → sort ascending/descending
  • Paint Color input → enter color code per part (e.g., RAL 7016)
  • Prep Notes textarea → edit auto-generated instructions per part
  • Face breakdown organized by side (Front, Rear, Top, Bottom, etc.)
  • Per-face formulas with exact numbers
  • Side color-coding for visual classification

  REPORT STRUCTURE:
  • Header (blue gradient): Title, file name, mode, revision, author
  • Summary cards: Parts count, Surfaces count, Grand Total (sq in + sq ft)
  • Main data table with expandable rows
  • Print-only prep notes section (visible in PDF export only)

================================================================================
  12. EXCEL EXPORT
================================================================================

  Click "Export Excel" in the report toolbar.

  CONTENTS:
  • Report header with file name, mode, revision, author, date
  • Summary table: Part Name, Material, Size, Qty, Each area, Total area,
    %, Paint Color
  • Separate Prep Notes table below with Part, Material, Paint Color,
    and Preparation Instructions
  • Grand Total row highlighted in yellow

  FORMAT: .xls (HTML-based, opens in Excel, Google Sheets, LibreOffice Calc)

  TIP: Edit paint colors and prep notes in the HTML report FIRST, then
  export. The values sync automatically.

================================================================================
  13. PDF EXPORT
================================================================================

  Click "Export PDF" in the report toolbar → browser Print dialog opens.

  RECOMMENDED PRINT SETTINGS:
  • Destination: "Save as PDF"
  • Margins: Minimum
  • Uncheck "Headers and footers"
  • Enable "Background graphics" (for colored headers and badges)

  PDF CONTENTS:
  • Clean dark-blue header with title, file name, mode, revision, author
  • Summary strip (Parts, Surfaces, Grand Totals)
  • Data table with all parts, areas, percentages
  • Paint Color column (values from HTML report)
  • Prep Notes table at the bottom
  • Grand Total row in yellow
  • Expandable detail rows are HIDDEN in PDF (clean printout)

================================================================================
  14. SCREENSHOT / THUMBNAIL CAPTURE
================================================================================

  For Part and Assembly reports, the macro attempts to capture a screenshot.

  PROCESS:
  1. Switches to Isometric view
  2. Zooms to fit
  3. Captures using ModelView.SaveImage
  4. Converts to base64 PNG and embeds in HTML

  FALLBACKS: If SaveImage fails, tries alternative capture methods.
  If all methods fail, the report is generated without a thumbnail.

  NOTE: Screenshot may fail in remote desktop sessions or with certain
  graphics drivers. The report still works without it.

================================================================================
  15. ASSEMBLY HANDLING
================================================================================

  DEDUPLICATION:
  • Parts with the same file path are grouped into one row
  • Quantity is automatically counted
  • Total area = Each area × Quantity

  EXCLUSIONS:
  • Suppressed components → always excluded
  • Envelope components → always excluded
  • Sub-assembly containers → skipped (only Part docs included)

  ISOLATED VIEW:
  • If any components are hidden, the macro detects this
  • Only visible (non-hidden) parts are included
  • Report header shows "ISOLATED VIEW (X of Y visible)"

================================================================================
  16. TROUBLESHOOTING
================================================================================

  Q: "Please open a Part or Assembly first!"
  A: Open a SolidWorks part (.sldprt) or assembly (.sldasm) before running.

  Q: The report opens but shows 0 components.
  A: Check that components are not suppressed. Check that parts are
     loaded (lightweight components may not have full geometry).

  Q: Areas seem wrong.
  A: The macro reports ALL surface area including internal faces. For paint
     quoting, the surface classification helps identify exterior faces.
     Try selecting specific exterior faces before running.

  Q: Screenshot is blank or missing.
  A: This can happen with remote desktop or certain GPU drivers. The report
     works without the screenshot.

  Q: The macro is slow on large assemblies.
  A: For assemblies with 500+ parts, expect 10–30 seconds. You can select
     specific components before running to limit scope.

  Q: "Unknown document type!"
  A: The macro only works with Part and Assembly documents. Drawings are
     not supported.

  Q: Sort buttons don't work in the HTML report.
  A: Ensure JavaScript is enabled in your browser. The report uses
     client-side sorting.
